<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kumbaya — Component Cheatsheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== tokens (from feed) ===== */
:root{
  --bg:#F2EEEA;--card:#ffffff;--ink:#2A241C;--ink-soft:#6D6153;--ink-faint:#948A7B;
  --orange:#FF6622;--orange-dim:#FFE4D6;--coffee:#A9906F;--coffee-hover:#8A7452;
  --green:#1FA463;--red:#E5453F;--line:rgba(80,70,59,0.12);
  --glass-light:rgba(255,255,255,0.68);--glass-dark:rgba(30,26,20,0.55);
  --sidebar-w:220px;--sidebar-w-collapsed:76px;
  --radius-lg:20px;--radius-md:14px;--radius-sm:10px;
  --shadow:0 8px 30px rgba(40,30,20,0.10);
  --meme-bg:#F3B98C;--meme-fg:#6B2A0A;--dare-bg:#ABD1FC;--dare-fg:#14265E;
  --feed-peek:28px;
  --cs-nav:240px;
  color-scheme:light;
}
html.dark{
  --bg:#070403;--card:#211D18;--ink:#F4EFE7;--ink-soft:#B3A895;--ink-faint:#7A7062;
  --orange:#FF7A3D;--orange-dim:#3A2418;--coffee:#C7B291;--coffee-hover:#E4D4B8;
  --green:#33C285;--red:#FF6A63;--line:rgba(255,255,255,0.10);
  --glass-light:rgba(255,255,255,0.14);--glass-dark:rgba(10,8,6,0.55);
  color-scheme:dark;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;font-family:'Inter',ui-sans-serif,system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent;}
button,input{font-family:inherit;}
code,pre,.mono{font-family:'IBM Plex Mono',ui-monospace,monospace;}
a{color:var(--orange);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ===== cheatsheet chrome ===== */
.cs-top{
  position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;
  height:52px;padding:0 16px;background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.cs-top .mark{width:22px;height:16px;color:var(--orange);flex-shrink:0;}
.cs-top h1{margin:0;font-size:14px;font-weight:700;letter-spacing:-.01em;}
.cs-top .sub{font-size:12px;color:var(--ink-faint);font-weight:500;}
.cs-top .spacer{flex:1;}
.cs-top .link{font-size:12px;font-weight:600;color:var(--ink-soft);padding:6px 10px;border-radius:8px;}
.cs-top .link:hover{background:var(--line);text-decoration:none;color:var(--ink);}
.cs-iconbtn{
  width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--card);
  color:var(--ink-soft);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
}
.cs-iconbtn:hover{background:var(--line);color:var(--ink);}

.cs-shell{display:grid;grid-template-columns:var(--cs-nav) 1fr;min-height:calc(100vh - 52px);}
@media(max-width:900px){
  .cs-shell{grid-template-columns:1fr;}
  .cs-nav{display:none;}
  .cs-nav.open{display:block;position:fixed;inset:52px 0 auto 0;z-index:40;max-height:calc(100vh - 52px);overflow:auto;background:var(--card);border-bottom:1px solid var(--line);box-shadow:var(--shadow);}
}

.cs-nav{
  position:sticky;top:52px;align-self:start;height:calc(100vh - 52px);overflow:auto;
  padding:16px 12px 40px;border-right:1px solid var(--line);background:var(--bg);
}
.cs-nav .group{margin:0 0 18px;}
.cs-nav .group-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);padding:0 8px 6px;}
.cs-nav a{
  display:block;padding:7px 8px;border-radius:8px;font-size:12.5px;font-weight:600;
  color:var(--ink-soft);text-decoration:none;
}
.cs-nav a:hover{background:var(--line);color:var(--ink);text-decoration:none;}
.cs-nav a.active{background:var(--orange-dim);color:var(--orange);}

.cs-main{padding:28px 28px 80px;max-width:1100px;}
@media(max-width:900px){.cs-main{padding:18px 14px 64px;}}

.cs-hero{margin-bottom:36px;}
.cs-hero h2{margin:0 0 6px;font-size:28px;font-weight:800;letter-spacing:-.03em;}
.cs-hero p{margin:0;font-size:14px;color:var(--ink-soft);line-height:1.5;max-width:54ch;}
.cs-hero .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.cs-chip{
  display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;
  border:1px solid var(--line);background:var(--card);font-size:11px;font-weight:600;color:var(--ink-soft);
}
.cs-chip b{color:var(--ink);}

.cs-section{margin:0 0 48px;scroll-margin-top:68px;}
.cs-section > header{margin-bottom:12px;}
.cs-section > header h3{margin:0 0 4px;font-size:18px;font-weight:800;letter-spacing:-.02em;}
.cs-section > header p{margin:0;font-size:13px;color:var(--ink-soft);line-height:1.45;}
.cs-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.cs-tag{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border-radius:6px;background:var(--line);color:var(--ink-soft);}
.cs-tag.d{background:var(--dare-bg);color:var(--dare-fg);}
.cs-tag.m{background:var(--meme-bg);color:var(--meme-fg);}
.cs-tag.o{background:var(--orange-dim);color:var(--orange);}

.cs-panel{
  border:1px solid var(--line);border-radius:14px;background:var(--card);overflow:hidden;
}
.cs-toolbar{
  display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--line);
  background:color-mix(in srgb, var(--bg) 55%, var(--card));
}
.cs-seg{display:inline-flex;padding:2px;border-radius:9px;background:var(--line);gap:2px;}
.cs-seg button{
  border:none;background:transparent;color:var(--ink-soft);font-size:11px;font-weight:700;
  padding:5px 10px;border-radius:7px;cursor:pointer;
}
.cs-seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.cs-toolbar .spacer{flex:1;}
.cs-copy{
  border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-size:11px;font-weight:700;
  padding:5px 10px;border-radius:8px;cursor:pointer;
}
.cs-copy:hover{color:var(--ink);}
.cs-copy.ok{color:var(--green);border-color:color-mix(in srgb, var(--green) 35%, var(--line));}

.cs-body{display:none;}
.cs-body.on{display:block;}
.cs-preview{padding:18px;background:
  linear-gradient(90deg, color-mix(in srgb, var(--line) 70%, transparent) 1px, transparent 1px) 0 0 / 16px 16px,
  linear-gradient(color-mix(in srgb, var(--line) 70%, transparent) 1px, transparent 1px) 0 0 / 16px 16px,
  var(--bg);
}
.cs-frames{display:grid;gap:14px;}
.cs-frames.both{grid-template-columns:1fr 1fr;}
@media(max-width:780px){.cs-frames.both{grid-template-columns:1fr;}}
.cs-frame{
  border:1px solid var(--line);border-radius:12px;background:var(--card);overflow:hidden;
  box-shadow:0 8px 24px rgba(42,36,28,.06);
}
.cs-frame .label{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:7px 10px;border-bottom:1px solid var(--line);font-size:10px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);background:var(--bg);
}
.cs-frame .stage{padding:16px;min-height:120px;}
.cs-frame.phone .stage{padding:12px;max-width:360px;margin:0 auto;}
.cs-frame.dark-stage .stage{background:#0c0b0a;}
.cs-frame.media-stage .stage{background:#111;padding:0;}

.cs-code{display:none;position:relative;}
.cs-code.on{display:block;}
.cs-code pre{
  margin:0;padding:14px 16px;overflow:auto;max-height:420px;font-size:11.5px;line-height:1.55;
  background:#1a1714;color:#f0e9df;
}
html.dark .cs-code pre{background:#0e0c0a;}
.cs-code .lang{
  position:absolute;top:8px;right:10px;font-size:10px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:rgba(255,255,255,.35);pointer-events:none;
}
.cs-code-tabs{display:flex;gap:2px;padding:6px 8px 0;background:#1a1714;border-bottom:1px solid rgba(255,255,255,.06);}
.cs-code-tabs button{
  border:none;background:transparent;color:rgba(255,255,255,.45);font-size:11px;font-weight:700;
  padding:7px 10px;border-radius:8px 8px 0 0;cursor:pointer;
}
.cs-code-tabs button.on{background:rgba(255,255,255,.06);color:#fff;}

.cs-matrix{width:100%;border-collapse:collapse;font-size:12px;}
.cs-matrix th,.cs-matrix td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;}
.cs-matrix th{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;background:var(--bg);}
.cs-matrix td.mono{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);}
.cs-matrix tr:last-child td{border-bottom:none;}

.cs-grid{display:grid;gap:10px;}
.cs-grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr));}
.cs-grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr));}
.cs-grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr));}
@media(max-width:700px){
  .cs-grid.cols-3,.cs-grid.cols-4{grid-template-columns:repeat(2,minmax(0,1fr));}
}

.cs-state{
  border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--card);
}
.cs-state .cap{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;}

.cs-note{
  margin-top:10px;padding:10px 12px;border-radius:10px;border:1px dashed var(--line);
  font-size:12px;color:var(--ink-soft);line-height:1.45;
}
.cs-note code{font-size:11px;background:var(--line);padding:1px 5px;border-radius:4px;color:var(--ink);}

.cs-swatch{display:flex;align-items:center;gap:10px;}
.cs-swatch .chip{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);flex-shrink:0;}
.cs-swatch .name{font-size:12px;font-weight:700;}
.cs-swatch .val{font-size:11px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;}

/* ===== demo component styles (subset) ===== */
.demo-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;}
.demo-nav-item:hover{background:var(--line);color:var(--ink);}
.demo-nav-item.active{background:var(--orange-dim);color:var(--orange);}
.demo-nav-item svg{width:16px;height:16px;flex-shrink:0;}

.demo-pill-input{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 6px;background:var(--card);border:1px solid #D1CDC7;border-radius:999px;min-height:48px;}
html.dark .demo-pill-input{border-color:rgba(255,255,255,.14);}
.demo-pill-input.focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(42,36,28,.06);}
.demo-pill-input .av{width:28px;height:28px;border-radius:50%;}
.demo-pill-input .ph{flex:1;font-size:14px;color:var(--ink-faint);font-weight:500;}
.demo-pill-input .send{width:34px;height:34px;border-radius:12px;background:var(--ink);color:var(--bg);display:inline-flex;align-items:center;justify-content:center;border:none;}

.demo-react{display:inline-flex;flex-direction:column;align-items:center;gap:4px;}
.demo-react button{
  width:46px;height:46px;border-radius:50%;border:none;background:var(--card);color:var(--ink);
  display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),background .2s,color .2s;
}
.demo-react button:active{transform:scale(.9);}
.demo-react button.active.tip{background:var(--orange);color:#fff;}
.demo-react button.active.like{background:var(--green);color:#fff;}
.demo-react button.active.dislike{background:var(--red);color:#fff;}
.demo-react button.pulse{animation:reactPulse .42s cubic-bezier(.22,1.5,.36,1);}
.demo-react .c{font-size:11px;font-weight:700;color:var(--ink-faint);}
.demo-react.glass button{background:var(--glass-dark);color:#fff;backdrop-filter:blur(10px);}
.demo-react.glass .c{color:rgba(255,255,255,.75);}
@keyframes reactPulse{0%{transform:scale(1)}40%{transform:scale(1.14)}100%{transform:scale(1)}}

.demo-c-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:16px;border:none;background:none;font-size:11px;font-weight:700;color:var(--ink-soft);cursor:pointer;}
.demo-c-pill:hover{background:var(--line);color:var(--ink);}
.demo-c-pill.tip.active{color:var(--orange);background:var(--orange-dim);}
.demo-c-pill.like.active{color:var(--green);background:rgba(31,164,99,.12);}
.demo-c-pill.dislike.active{color:var(--red);background:rgba(229,69,63,.1);}
.demo-c-pill svg{width:14px;height:14px;}

.demo-anon-pop{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 28px rgba(0,0,0,.14);width:fit-content;}
.demo-anon-pop img{width:28px;height:28px;border-radius:50%;}
.demo-anon-pop .lbl{font-size:13px;font-weight:700;color:#8B3A2A;}
html.dark .demo-anon-pop .lbl{color:#E8A090;}
.demo-switch{position:relative;width:36px;height:22px;border-radius:999px;background:#F3E6DC;border:none;cursor:pointer;padding:0;}
.demo-switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#F0B89A;transition:transform .18s ease,background .18s;}
.demo-switch.on{background:var(--orange);}
.demo-switch.on::after{transform:translateX(14px);background:#fff;}

.demo-attach{position:relative;width:72px;height:72px;}
.demo-attach img{width:72px;height:72px;border-radius:12px;object-fit:cover;display:block;box-shadow:0 6px 18px rgba(0,0,0,.12);}
.demo-attach .x{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;border:2px solid var(--card);background:var(--ink);color:var(--bg);font-size:11px;display:flex;align-items:center;justify-content:center;}

.demo-drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:140px;padding:24px;border-radius:20px;border:1.5px dashed rgba(255,102,34,.42);background:rgba(255,102,34,.06);color:var(--orange);font-size:13px;font-weight:700;}

.demo-skel{display:flex;gap:10px;}
.demo-skel .a{width:36px;height:36px;border-radius:50%;background:var(--line);position:relative;overflow:hidden;}
.demo-skel .b{flex:1;display:flex;flex-direction:column;gap:8px;padding-top:2px;}
.demo-skel .l{height:11px;border-radius:6px;background:var(--line);position:relative;overflow:hidden;}
.demo-skel .a::after,.demo-skel .l::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.45) 50%,transparent 65%);background-size:220% 100%;animation:shimmer 1.15s ease infinite;}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

.demo-glass{width:46px;height:46px;border-radius:50%;border:none;background:var(--glass-dark);color:#fff;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
.demo-glass:active{transform:scale(.88);}
.demo-glass svg{width:24px;height:24px;display:block;}

/* mute ↔ sound morph (match feed.html) */
.mute-icon{overflow:visible;}
.mute-icon .mute-cone{
  fill:none;stroke:currentColor;stroke-width:2.35;stroke-linecap:round;stroke-linejoin:round;
}
.mute-icon .mute-draw{
  fill:none;stroke:currentColor;stroke-width:2.35;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:1;stroke-dashoffset:1;
}
.mute-btn[data-sound="1"] .mute-slash{display:none;}
.mute-btn[data-sound="0"] .mute-waves{display:none;}
.mute-btn[data-sound="1"] .mute-waves .mute-draw,
.mute-btn[data-sound="0"] .mute-slash .mute-draw{
  animation:muteDraw .2s ease-in-out forwards;
}
.mute-btn[data-sound="1"] .mute-waves .mute-draw-delay,
.mute-btn[data-sound="0"] .mute-slash .mute-draw-delay{animation-delay:.1s;}
.mute-btn.is-settled[data-sound="1"] .mute-waves .mute-draw,
.mute-btn.is-settled[data-sound="0"] .mute-slash .mute-draw{
  animation:none;stroke-dashoffset:0;
}
@keyframes muteDraw{to{stroke-dashoffset:0;}}
@media (prefers-reduced-motion:reduce){
  .mute-btn .mute-draw{animation:none!important;stroke-dashoffset:0;}
}

.demo-mnav{display:flex;align-items:center;justify-content:space-around;gap:2px;padding:8px 6px;background:var(--card);border:1px solid var(--line);border-radius:16px;}
.demo-mnav button{flex:1;height:40px;border:none;background:none;color:var(--ink-soft);border-radius:12px;cursor:pointer;}
.demo-mnav button.active{color:var(--orange);}
.demo-mnav button.launch{flex:0 0 auto;width:48px;height:48px;border-radius:14px;background:var(--orange);color:#fff;}
.demo-mnav button.more-open{background:var(--card);color:var(--ink);box-shadow:0 4px 12px rgba(42,36,28,.08);}

.demo-sheet-item{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:14px;font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;}
.demo-sheet-item:hover{background:var(--line);}
.demo-sheet-item svg{width:20px;height:20px;}

.demo-cfx-media{border-radius:16px;overflow:hidden;max-width:220px;box-shadow:0 16px 40px rgba(0,0,0,.4);}
.demo-cfx-media img{display:block;width:100%;height:auto;}

.demo-comment{display:flex;gap:10px;align-items:flex-start;}
.demo-comment .av{width:36px;height:36px;border-radius:50%;flex-shrink:0;}
.demo-comment .user{font-weight:700;font-size:13px;}
.demo-comment .time{font-size:12px;color:var(--ink-faint);margin-left:6px;}
.demo-comment .txt{font-size:13.5px;line-height:1.45;margin:4px 0 8px;}
.demo-comment .quote{color:var(--coffee);font-weight:600;}

.demo-btn-launch{display:inline-flex;align-items:center;gap:8px;background:var(--orange);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;}
.demo-btn-wallet{display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:var(--bg);border:none;border-radius:10px;padding:9px 14px;font-weight:700;font-size:13px;}
.demo-btn-wallet img{width:20px;height:20px;border-radius:50%;}

.demo-haptic-row{display:flex;flex-wrap:wrap;gap:8px;}
.demo-haptic-row button{
  border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 12px;
  font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;
}
.demo-haptic-row button:active{transform:scale(.96);}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}
</style>
</head>
<body>
<header class="cs-top">
  <button class="cs-iconbtn" id="navToggle" aria-label="Menu" type="button">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>
  <svg class="mark" viewBox="0 0 30 22" fill="none"><path d="M2 20 Q4 6 9 10 Q11 2 14 9 Q17 1 20 9 Q25 4 28 20 Z" fill="currentColor"/></svg>
  <h1>Cheatsheet</h1>
  <span class="sub">feed components · states · microinteractions</span>
  <div class="spacer"></div>
  <a class="link" href="/feed.html">Feed</a>
  <button class="cs-iconbtn" id="themeBtn" type="button" title="Toggle theme" aria-label="Toggle theme">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
</header>
<div class="cs-shell">
  <nav class="cs-nav" id="csNav" aria-label="Components"></nav>
  <main class="cs-main" id="csMain"></main>
</div>
<script src="/public/cs/catalog.js"></script>
<script src="/public/cs/app.js"></script>
</body>
</html>
